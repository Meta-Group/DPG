name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install Graphviz so Sphinx can import modules that reference it
      - name: Install system dependencies
        run: sudo apt-get install -y graphviz

      - name: Install package + docs dependencies
        run: pip install ".[docs]"

      # -W  → warnings become errors, but exclude the known-benign autoapi
      # placeholder warning that fires when astroid can't fully introspect
      # C-extension types (pandas._libs, numpy C API, etc.).
      # We pipe through grep to fail on any OTHER unexpected warning.
      - name: Build Sphinx docs
        run: |
          sphinx-build --keep-going -b html docs/ docs/_build/html 2>&1 | tee /tmp/sphinx_out.txt
          # Fail if any WARNING line is present that is NOT the benign placeholder one
          if grep -v "Unknown type: placeholder" /tmp/sphinx_out.txt | grep -q "^WARNING:"; then
            echo "Unexpected Sphinx warnings found:"
            grep -v "Unknown type: placeholder" /tmp/sphinx_out.txt | grep "^WARNING:"
            exit 1
          fi

      - name: Upload HTML docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/_build/html/
          retention-days: 7
