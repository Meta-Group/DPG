# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

# Install the package and the docs extra group
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

# Point Sphinx at the docs/ directory
sphinx:
  builder: html
  configuration: docs/conf.py
  fail_on_warning: true
